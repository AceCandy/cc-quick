name: Sync cc.storyfox.cz

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/sync.yml'
      - 'scripts/**'
      - 'data/config/**'
      - 'templates/**'
      - 'package.json'
      - 'package-lock.json'
      - 'script.js'
  schedule:
    - cron: '7 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run sync
        run: npm run sync

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data/
          git diff --cached --quiet || git commit -m "chore: auto sync cc quick page"

      - name: Push changes
        run: git push
