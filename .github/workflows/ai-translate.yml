name: Refresh AI Translation Map

on:
  workflow_run:
    workflows:
      - Sync cc.storyfox.cz
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  ai-translate:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Skip when OPENAI_API_KEY is missing
        if: env.OPENAI_API_KEY == ''
        run: echo "OPENAI_API_KEY 未配置，跳过 AI 翻译映射更新"

      - name: Setup Node
        if: env.OPENAI_API_KEY != ''
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        if: env.OPENAI_API_KEY != ''
        run: npm ci

      - name: Refresh upstream snapshot
        if: env.OPENAI_API_KEY != ''
        run: |
          npm run sync:fetch
          npm run sync:parse
          npm run sync:transform

      - name: Refresh AI translation map
        if: env.OPENAI_API_KEY != ''
        run: npm run sync:ai-map

      - name: Rebuild localized page
        if: env.OPENAI_API_KEY != ''
        run: |
          npm run sync:transform
          npm run sync:build

      - name: Commit changes
        id: commit_changes
        if: env.OPENAI_API_KEY != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: refresh ai translation map"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push changes
        if: env.OPENAI_API_KEY != '' && steps.commit_changes.outputs.changed == 'true'
        run: git push

      - name: Request Pages rebuild
        if: env.OPENAI_API_KEY != '' && steps.commit_changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds"
