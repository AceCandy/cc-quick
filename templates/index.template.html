<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Claude Code 中文速查表，面向中文开发者整理的快捷键、命令、配置、工作流与 CLI 参数参考。">
  <title>Claude Code 中文速查表</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⌨️</text></svg>">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <a class="skip-link" href="#main-content">跳到正文</a>
  <div class="page">
    <header class="header">
      <div class="header-title">
        <div class="header-heading">
          <h1>Claude Code 中文速查表</h1>
          <a class="github-star-link" href="https://github.com/AceCandy/cc-quick" target="_blank" rel="noreferrer noopener" aria-label="在 GitHub 上为 cc-quick 点 Star">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0.2a8 8 0 0 0-2.53 15.59c0.4 0.08 0.55-0.17 0.55-0.38l-0.01-1.49c-2.25 0.49-2.72-0.96-2.72-0.96-0.36-0.93-0.9-1.18-0.9-1.18-0.74-0.5 0.06-0.49 0.06-0.49 0.81 0.06 1.24 0.84 1.24 0.84 0.72 1.24 1.89 0.88 2.35 0.67 0.07-0.52 0.28-0.88 0.51-1.08-1.79-0.2-3.68-0.9-3.68-3.99 0-0.88 0.31-1.6 0.83-2.16-0.08-0.2-0.36-1.03 0.08-2.13 0 0 0.68-0.22 2.22 0.82A7.7 7.7 0 0 1 8 3.49c0.68 0 1.36 0.09 2 0.27 1.54-1.04 2.22-0.82 2.22-0.82 0.44 1.1 0.16 1.93 0.08 2.13 0.52 0.56 0.83 1.28 0.83 2.16 0 3.1-1.89 3.78-3.69 3.98 0.29 0.25 0.55 0.74 0.55 1.5l-0.01 2.7c0 0.21 0.14 0.46 0.56 0.38A8 8 0 0 0 8 0.2Z"/></svg>
            <span>GitHub Star</span>
          </a>
        </div>
        <button class="changelog-trigger" type="button" aria-controls="changelogPanel" aria-expanded="false">
          最近变更
        </button>
      </div>
      <div class="header-right">
        <div class="header-controls">
          <div class="os-toggle" id="osToggle" aria-label="系统快捷键切换">
            <button class="os-btn active" type="button" data-os="mac" title="Mac 快捷键" aria-label="切换到 Mac 快捷键">
              <svg width="14" height="14" viewBox="0 0 814 1000" fill="currentColor" aria-hidden="true"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57.8-155.5-127.4c-58.4-83-106.3-211.5-106.3-334.2 0-196.5 127.8-300.9 253.3-300.9 66.8 0 122.4 43.4 164.1 43.4 39.5 0 101.1-46 176.2-46 28.5 0 130.9 2.6 198.3 99.1zm-169.5-92.8c31.2-37 52.4-88.1 52.4-139.3 0-7.1-.6-14.3-1.9-20.1-50 1.6-109.2 33.3-145 75.1-25.8 29.3-52.4 79.8-52.4 131.6 0 7.8.6 15.6 1.3 18.2 2.6.6 6.4 1.3 10.3 1.3 44.7 0 101.1-30.5 135.3-66.8z"/></svg>
              <span class="os-btn-label">Mac</span>
            </button>
            <button class="os-btn" type="button" data-os="win" title="Windows 快捷键" aria-label="切换到 Windows 快捷键">
              <svg width="14" height="14" viewBox="0 0 88 88" fill="currentColor" aria-hidden="true"><path d="M0 12.402l35.687-4.86.016 34.423-35.67.203zm35.67 33.529l.028 34.453L.028 71.48l-.026-25.55zm4.326-39.025L87.314 0v41.527l-47.318.376zm47.329 39.349l-.011 41.34-47.318-6.678-.066-34.739z"/></svg>
              <span class="os-btn-label">Win</span>
            </button>
          </div>
          <div class="theme-toggle" id="themeToggle" aria-label="主题切换">
            <button class="theme-btn active" type="button" data-theme="light" aria-label="切换到浅色主题">浅</button>
            <button class="theme-btn" type="button" data-theme="dark" aria-label="切换到深色主题">深</button>
          </div>
        </div>
        <div class="header-meta">
          <span class="version-info">{{VERSION_HTML}}</span>
          <span class="last-updated">{{LAST_UPDATED}}</span>
        </div>
      </div>
      <div class="changelog-panel" id="changelogPanel" hidden>
        <ul class="changelog-list">
          {{CHANGELOG_ITEMS}}
        </ul>
      </div>
    </header>

    <div class="page-shell">
      <main id="main-content" class="page-content">
        <div class="main-grid">
          {{SECTIONS_HTML}}
        </div>
      </main>

      <aside class="page-sidebar">
        {{SECTION_SWITCHER_HTML}}
      </aside>
    </div>

    <section class="appendix" aria-labelledby="appendix-title">
      <header class="appendix-header">
        <h2 class="appendix-title" id="appendix-title">补充参考</h2>
      </header>
      <footer class="footer">
        {{FOOTER_HTML}}
        <div class="footer-row">
          <span class="footer-item">页面由上游内容自动同步生成；未命中词表时默认保留原文。</span>
        </div>
      </footer>
    </section>
  </div>

  <script src="./script.js"></script>
</body>
</html>
